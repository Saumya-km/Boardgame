apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: boardgame
rules:
  - apiGroups:
      - ""
      - "apps"
      - "autoscaling"
      - "batch"
      - "extensions"
      - "policy"
      - "rbac.authorization.k8s.io"
    resources:
      - pods
      - services
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
      - configmaps
      - secrets
      - events
      - limitranges
      - resourcequotas
      - persistentvolumeclaims
      - ingresses
      - jobs
      - cronjobs
      - horizontalpodautoscalers
      - serviceaccounts
      - replicationcontrollers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
